name: Auto Deploy Website

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd devops-demo || git clone https://github.com/Yashrathore05/devops-demo.git
            cd devops-demo
            git pull

            sudo docker build -t devops-html .

            # Stop all containers (fix port issue)
            sudo docker stop $(sudo docker ps -q) || true
            sudo docker rm $(sudo docker ps -aq) || true

            sudo docker run -d -p 80:80 devops-html